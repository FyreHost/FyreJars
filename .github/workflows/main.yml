# This is a basic workflow to help you get started with Actions

name: Build Jars and Commit

# Controls when the workflow will run
on:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2
      - name: Set up JDK 8
        uses: actions/setup-java@v2.5.0
        with:
          java-version: 8
          distribution: adopt-openj9
          
      
      # Runs a single command using the runners shell
      - name: Get BuildTools
        run:  | 
          mkdir BuildTools
          cd BuildTools
          wget -O BuildTools.jar https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar
          
      - name: Build Jars
        run: |
          cd BuildTools
          echo 'Started 1.16.5'
          java -jar BuildTools.jar --rev 1.16.5 >> /dev/null 2>&1
          echo 'Started 1.16.4'
          java -jar BuildTools.jar --rev 1.16.4 >> /dev/null 2>&1
          echo 'Started 1.16.3'
          java -jar BuildTools.jar --rev 1.16.3 >> /dev/null 2>&1
          echo 'Started 1.16.2'
          java -jar BuildTools.jar --rev 1.16.2 >> /dev/null 2>&1
          echo 'Started 1.16.1'
          java -jar BuildTools.jar --rev 1.16.1 >> /dev/null 2>&1
          echo 'Started 1.15.2'
          java -jar BuildTools.jar --rev 1.15.2 >> /dev/null 2>&1
          echo 'Started 1.15.2'
          java -jar BuildTools.jar --rev 1.15.1 >> /dev/null 2>&1
          echo 'Started 1.15'
          java -jar BuildTools.jar --rev 1.15 >> /dev/null 2>&1
          echo 'Started 1.14.4'
          java -jar BuildTools.jar --rev 1.14.4 >> /dev/null 2>&1
          echo 'Started 1.14.3'
          java -jar BuildTools.jar --rev 1.14.3 >> /dev/null 2>&1
          echo 'Started 1.14.2'
          java -jar BuildTools.jar --rev 1.14.2 >> /dev/null 2>&1
          echo 'Started 1.14.1'
          java -jar BuildTools.jar --rev 1.14.1 >> /dev/null 2>&1
          echo 'Started 1.13.2'
          java -jar BuildTools.jar --rev 1.13.2 >> /dev/null 2>&1
          echo 'Started 1.13.1'
          java -jar BuildTools.jar --rev 1.13.1 >> /dev/null 2>&1
          echo 'Started 1.13'
          java -jar BuildTools.jar --rev 1.13 >> /dev/null 2>&1
          echo 'Started 1.12.2'
          java -jar BuildTools.jar --rev 1.12.2 >> /dev/null 2>&1
          echo 'Started 1.12.1'
          java -jar BuildTools.jar --rev 1.12.1 >> /dev/null 2>&1
          echo 'Started 1.12'
          java -jar BuildTools.jar --rev 1.12 >> /dev/null 2>&1
          echo 'Started 1.11.2'
          java -jar BuildTools.jar --rev 1.11.2 >> /dev/null 2>&1
          echo 'Started 1.11.1'
          java -jar BuildTools.jar --rev 1.11 >> /dev/null 2>&1
          echo 'Started 1.10.2'
          java -jar BuildTools.jar --rev 1.10.2 >> /dev/null 2>&1
          echo 'Started 1.9.4'
          java -jar BuildTools.jar --rev 1.9.4 >> /dev/null 2>&1
          echo 'Started 1.9.2'
          java -jar BuildTools.jar --rev 1.9.2 >> /dev/null 2>&1
          echo 'Started 1.9'
          java -jar BuildTools.jar --rev 1.9 >> /dev/null 2>&1
          echo 'Started 1.8.8'
          java -jar BuildTools.jar --rev 1.8.8 >> /dev/null 2>&1
          mv -f spigot-1.16.5.jar ../spigot/1.16.5.jar
          mv -f spigot-1.16.4.jar ../spigot/1.16.4.jar
          mv -f spigot-1.16.3.jar ../spigot/1.16.3.jar
          mv -f spigot-1.16.2.jar ../spigot/1.16.2.jar
          mv -f spigot-1.16.1.jar ../spigot/1.16.1.jar
          mv -f spigot-1.15.2.jar ../spigot/1.15.2.jar
          mv -f spigot-1.15.1.jar ../spigot/1.15.1.jar
          mv -f spigot-1.15.jar ../spigot/1.15.jar
          mv -f spigot-1.14.4.jar ../spigot/1.14.4.jar
          mv -f spigot-1.14.3.jar ../spigot/1.14.3.jar
          mv -f spigot-1.14.2.jar ../spigot/1.14.2.jar
          mv -f spigot-1.14.1.jar ../spigot/1.14.1.jar
          mv -f spigot-1.13.2.jar ../spigot/1.13.2.jar
          mv -f spigot-1.13.1.jar ../spigot/1.13.1.jar
          mv -f spigot-1.13.jar ../spigot/1.13.jar
          mv -f spigot-1.12.2.jar ../spigot/1.12.2.jar
          mv -f spigot-1.12.1.jar ../spigot/1.12.1.jar
          mv -f spigot-1.12.jar ../spigot/1.12.jar
          mv -f spigot-1.11.2.jar ../spigot/1.11.2.jar
          mv -f spigot-1.11.jar ../spigot/1.11.jar
          mv -f spigot-1.10.2.jar ../spigot/1.10.2.jar
          mv -f spigot-1.9.4.jar ../spigot/1.9.4.jar
          mv -f spigot-1.9.2.jar ../spigot/1.9.2.jar
          mv -f spigot-1.9.jar ../spigot/1.9.jar
          mv -f spigot-1.8.8.jar ../spigot/1.8.8.jar
          
      - name: Set up JDK 16
        uses: actions/setup-java@v2.5.0
        with:
          java-version: 16
          distribution: adopt-openj9
          
      - name: Build 1.17 Jar
        run: |
          cd BuildTools
          echo 'Started 1.17'
          java -jar BuildTools.jar --rev 1.17 >> /dev/null 2>&1
          echo 'Started 1.17.1'
          java -jar BuildTools.jar --rev 1.17.1 >> /dev/null 2>&1
          mv -f spigot-1.17.jar ../spigot/1.17.jar
          mv -f spigot-1.17.1.jar ../spigot/1.17.1.jar
          
      - name: Set up JDK 17
        uses: actions/setup-java@v2.5.0
        with:
          java-version: 17
          distribution: adopt-openj9
          
      - name: Build 1.18 Jar
        run: |
          cd BuildTools
          echo 'Started 1.18'
          java -jar BuildTools.jar --rev 1.18 >> /dev/null 2>&1
          echo 'Started 1.18.1'
          java -jar BuildTools.jar --rev 1.18.1 >> /dev/null 2>&1
          mv -f spigot-1.18.jar ../spigot/1.18.jar
          mv -f spigot-1.18.1.jar ../spigot/1.18.1.jar
          
          
      - name: Remove all Spigot buildtools data
        run: |
          rm -rf BuildTools
          
      - name: Prepare PaperSpigot
        run: |
          mkdir PaperBuildTools
          cd PaperBuildTools
          git clone https://github.com/PaperMC/Paper
          
      - name: Build 1.18.1 Paper Jar
        run: |
          cd PaperBuildTools
          echo 'Building 1.18.1 Paper Jar'
          ./gradlew applyPatches >> /dev/null 2>&1
          ./gradlew createReobfBundlerJar >> /dev/null 2>&1
          cd build
          cd libs
          mv -f paper-bundler-1.18.1-R0.1-SNAPSHOT-reobf.jar ../../../../paper/1.18.1.jar
          cd ..
          cd ..
          git clean -fdX
          
      - name: Set up JDK 16
        uses: actions/setup-java@v2.5.0
        with:
          java-version: 16
          distribution: adopt-openj9
          
      - name: Build 1.17.1 Paper Jar
        run: |
          cd PaperBuildTools
          git checkout ver/1.17.1
          echo 'Building 1.17.1 Jar'
          ./gradlew applyPatches >> /dev/null 2>&1
          ./gradlew reobfJar >> /dev/null 2>&1
          cd Paper-Server/build/libs
          mv -f Paper-Server-1.17.1-R0.1-SNAPSHOT-mojang-mapped.jar ../../../../../paper/1.17.1.jar
          
      - name: Set up JDK 8
        uses: actions/setup-java@v2.5.0
        with:
          java-version: 8
          distribution: adopt-openj9
          
      - name: Build rest of Paper Jars
        run: |
          cd PaperBuildTools
          git restore .
          git clean -fdX
          git checkout ver/1.16.5
          git clean -fdX
          
          echo 'Making 1.16.5'
          
          ./paper jar >> /dev/null 2>&1
          mv -f paperclip.jar ../../paper/1.16.5.jar
          git restore .
          git clean -fdX
          git checkout ver/1.15.2
          git clean -fdX
          
          echo 'Making 1.15.2'
          
          ./paper jar >> /dev/null 2>&1
          mv -f paperclip.jar ../../paper/1.15.2.jar
          git restore .
          git clean -fdX
          git checkout ver/1.14
          git clean -fdX
          
          echo 'Making 1.14'
          
          ./paper jar >> /dev/null 2>&1
          mv -f paperclip.jar ../../paper/1.14.jar
          git restore .
          git clean -fdX
          git checkout ver/1.13.2
          git clean -fdX
          
          echo 'Making 1.13.2'
          
          ./paper jar >> /dev/null 2>&1
          mv -f paperclip.jar ../../paper/1.13.2.jar
          
          git restore .
          git clean -fdX
          git checkout ver/1.12.2
          git clean -fdX
          
          echo 'Making 1.12.2'
          
          ./paper jar >> /dev/null 2>&1
          mv -f paperclip.jar ../../paper/1.12.2.jar
          
          git restore .
          git clean -fdX
          git checkout ver/1.11.2
          git clean -fdX
          
          echo 'Making 1.11.2'
          
          ./paper jar >> /dev/null 2>&1
          mv -f paperclip.jar ../../paper/1.11.2.jar
          
          git restore .
          git clean -fdX
          git checkout ver/1.10.2
          git clean -fdX
          
          echo 'Making 1.10.2'
          
          ./paper jar >> /dev/null 2>&1
          mv -f paperclip.jar ../../paper/1.10.2.jar
          
          git restore .
          git clean -fdX
          git checkout ver/1.9.4
          git clean -fdX
          
          echo 'Making 1.9.4'
          
          ./paper jar >> /dev/null 2>&1
          mv -f paperclip.jar ../../paper/1.9.4.jar
          
          git restore .
          git clean -fdX
          git checkout ver/1.12.2
          git clean -fdX
          
          echo 'Making 1.12.2'
          
          bash ./build.sh >> /dev/null 2>&1
          
          mv -f paperclip.jar ../../paper/1.8.8.jar'
          
      - name: Commit Changes
        uses: EndBug/add-and-commit@v7 # You can change this to use a specific version.
        with:
          # The arguments for the `git add` command (see the paragraph below for more info)
          # Default: '.'
          add: 'spigot'

          # The name of the user that will be displayed as the author of the commit.
          # Default: depends on the default_author input
          author_name: FyreHost Bot

          # The email of the user that will be displayed as the author of the commit.
          # Default: depends on the default_author input
          author_email: git@fyrehost.net

      - name: Commit Changes Paper
        uses: EndBug/add-and-commit@v7 # You can change this to use a specific version.
        with:
          # The arguments for the `git add` command (see the paragraph below for more info)
          # Default: '.'
          add: 'paper'

          # The name of the user that will be displayed as the author of the commit.
          # Default: depends on the default_author input
          author_name: FyreHost Bot

          # The email of the user that will be displayed as the author of the commit.
          # Default: depends on the default_author input
          author_email: git@fyrehost.net
