# This is a basic workflow to help you get started with Actions

name: Build Jars and Commit

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron:  '0 0 * * *'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2
      - name: Set up JDK 8
        uses: actions/setup-java@v2.5.0
        with:
          java-version: 8
          distribution: adopt-openj9
          
      
      # Runs a single command using the runners shell
      - name: Build Spigot Jars Below 1.17
        run:  | 
          apt-get install git
          cd spigot
          wget -O BuildTools.jar https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar
          git config --global --unset core.autocrlf
          java -jar BuildTools.jar --rev 1.16.5
          java -jar BuildTools.jar --rev 1.16.4
          java -jar BuildTools.jar --rev 1.16.3
          java -jar BuildTools.jar --rev 1.16.2
          java -jar BuildTools.jar --rev 1.16.1
          java -jar BuildTools.jar --rev 1.15.2
          java -jar BuildTools.jar --rev 1.15.1
          java -jar BuildTools.jar --rev 1.15
          rm BuildTools.jar
          
      - name: Commit Changes
      - uses: EndBug/add-and-commit@v7 # You can change this to use a specific version.
        with:
          # The arguments for the `git add` command (see the paragraph below for more info)
          # Default: '.'
          add: 'src'

          # The name of the user that will be displayed as the author of the commit.
          # Default: depends on the default_author input
          author_name: FyreHost Bot

          # The email of the user that will be displayed as the author of the commit.
          # Default: depends on the default_author input
          author_email: git@fyrehost.net
